backend:
  name: git-gateway
  branch: main
  # Evita que cada salvamento no painel gere um deploy automático (que consome
  # créditos no Netlify). O commit fica salvo normalmente no GitHub; para
  # publicar as mudanças no site, use o botão "Trigger deploy" no painel do
  # Netlify quando quiser (pode juntar várias edições num só deploy).
  commit_messages:
    create: 'Cria {{collection}} "{{slug}}" [skip netlify]'
    update: 'Atualiza {{collection}} "{{slug}}" [skip netlify]'
    delete: 'Remove {{collection}} "{{slug}}" [skip netlify]'
    uploadMedia: 'Envia imagem "{{path}}" [skip netlify]'
    deleteMedia: 'Remove imagem "{{path}}" [skip netlify]'

media_folder: "uploads"
public_folder: "/uploads"

site_url: https://mariangelaturra.netlify.app
display_url: https://mariangelaturra.netlify.app

locale: "pt"

collections:
  - name: "config"
    label: "Configurações do site"
    files:
      - name: "geral"
        label: "Contato e textos gerais"
        file: "content/config.json"
        fields:
          - {label: "Nome — primeiro nome", name: "nomePrimeiro", widget: "string"}
          - {label: "Nome — sobrenome (aparece em dourado)", name: "nomeSegundo", widget: "string"}
          - {label: "Slogan (abaixo do nome)", name: "slogan", widget: "string"}
          - {label: "Título da aba do navegador", name: "tituloAba", widget: "string"}
          - {label: "CRECI", name: "creci", widget: "string"}
          - {label: "WhatsApp (somente números, com DDI+DDD, ex: 555596066786)", name: "whatsapp", widget: "string"}
          - {label: "WhatsApp — como aparece escrito (ex: (55) 9606-6786)", name: "whatsappExibicao", widget: "string"}
          - {label: "Mensagem padrão ao clicar em 'Fale com a corretora'", name: "mensagemWhatsapp", widget: "string"}
          - {label: "E-mail", name: "email", widget: "string"}
          - {label: "Endereço — linha 1 (rua e número)", name: "enderecoLinha1", widget: "string"}
          - {label: "Endereço — linha 2 (cidade, UF e CEP)", name: "enderecoLinha2", widget: "string"}
          - {label: "Link do Facebook", name: "facebook", widget: "string"}
          - {label: "Link do Instagram", name: "instagram", widget: "string"}
          - {label: "Instagram — usuário exibido (ex: @usuario)", name: "instagramHandle", widget: "string"}
          - {label: "Banner — parte em destaque (dourado)", name: "bannerDestaque", widget: "string"}
          - {label: "Banner — restante da frase", name: "bannerResto", widget: "string"}
          - {label: "Banner — texto abaixo do título", name: "bannerSubtitulo", widget: "text"}
          - {label: "Título da seção 'Empresa'", name: "empresaTitulo", widget: "string"}
          - {label: "Texto da seção 'Empresa'", name: "empresaTexto", widget: "text"}
          - {label: "Ano do copyright (rodapé)", name: "anoCopyright", widget: "string"}
          - {label: "Cor verde (detalhes principais)", name: "corVerde", widget: "color"}
          - {label: "Cor verde escura (cabeçalho/rodapé)", name: "corVerdeEscuro", widget: "color"}
          - {label: "Cor dourada (destaques)", name: "corOuro", widget: "color"}
          - {label: "Cor dourada clara", name: "corOuroClaro", widget: "color"}
          - {label: "Cor cinza (textos secundários)", name: "corCinza", widget: "color"}
          - {label: "Google Analytics — ID de mensuração (ex: G-XXXXXXXXXX, deixe vazio para desativar)", name: "googleAnalyticsId", widget: "string", required: false}
          - {label: "Menu — item 'Urbanos'", name: "menuUrbanos", widget: "string"}
          - {label: "Menu — item 'Rurais'", name: "menuRurais", widget: "string"}
          - {label: "Menu — item 'Mapa'", name: "menuMapa", widget: "string"}
          - {label: "Menu — item 'Contato'", name: "menuContato", widget: "string"}
          - {label: "Busca — rótulo 'Tipo de imóvel'", name: "labelTipo", widget: "string"}
          - {label: "Busca — rótulo 'Cidade'", name: "labelCidade", widget: "string"}
          - {label: "Busca — rótulo 'Dormitórios'", name: "labelDormitorios", widget: "string"}
          - {label: "Busca — rótulo 'Valor máx'", name: "labelValor", widget: "string"}
          - {label: "Busca — botão 'Limpar'", name: "botaoLimpar", widget: "string"}
          - {label: "Busca — botão 'Pesquisar'", name: "botaoPesquisar", widget: "string"}
          - {label: "Listagem — texto pequeno acima do título (ex: Catálogo)", name: "eyebrowCatalogo", widget: "string"}
          - {label: "Listagem — título padrão (Imóveis em destaque)", name: "tituloDestaque", widget: "string"}
          - {label: "Listagem — título ao filtrar Urbanos", name: "tituloUrbanos", widget: "string"}
          - {label: "Listagem — título ao filtrar Rurais", name: "tituloRurais", widget: "string"}
          - {label: "Listagem — título ao pesquisar", name: "tituloResultado", widget: "string"}
          - {label: "Listagem — mensagem quando não encontra imóveis", name: "textoSemResultados", widget: "string"}
          - {label: "Mapa geral — texto de ajuda abaixo do mapa", name: "textoMapaAjuda", widget: "string"}
          - {label: "Texto do botão de WhatsApp na página do imóvel", name: "textoBotaoZap", widget: "string"}

  - name: "imoveis"
    label: "Imóveis"
    label_singular: "Imóvel"
    folder: "content/imoveis"
    create: true
    extension: "json"
    format: "json"
    slug: "{{cod}}"
    identifier_field: "titulo"
    summary: "{{cod}} — {{titulo}} ({{cidade}})"
    sortableFields: ["cod", "titulo", "cidade", "preco"]
    view_filters:
      - {label: "Casas", field: "tipo", pattern: "Casa"}
      - {label: "Apartamentos", field: "tipo", pattern: "Apartamento"}
      - {label: "Terrenos", field: "tipo", pattern: "Terreno"}
      - {label: "Comerciais", field: "tipo", pattern: "Comercial"}
      - {label: "Rurais", field: "tipo", pattern: "Rural"}
      - {label: "Sem preço definido (Consulte)", field: "preco", pattern: "^$"}
      - {label: "Localização ainda aproximada", field: "aproximado", pattern: true}
    view_groups:
      - {label: "Por tipo de imóvel", field: "tipo"}
      - {label: "Por cidade", field: "cidade"}
    fields:
      - {label: "Código (ex. 049 — use um número novo a cada imóvel)", name: "cod", widget: "string"}
      - {label: "Título do anúncio", name: "titulo", widget: "string"}
      - {label: "Foto de capa (aparece no painel e como capa do anúncio)", name: "image", widget: "image", required: false}
      - label: "Tipo de imóvel"
        name: "tipo"
        widget: "select"
        options: ["Casa", "Apartamento", "Terreno", "Comercial", "Rural"]
      - {label: "Finalidade", name: "finalidade", widget: "hidden", default: "venda"}
      - {label: "É imóvel rural (fazenda/chácara/sítio)?", name: "rural", widget: "boolean", default: false}
      - {label: "Cidade", name: "cidade", widget: "string", default: "Júlio de Castilhos"}
      - {label: "Endereço", name: "endereco", widget: "string"}
      - label: "Preço em R$ (deixe vazio para mostrar 'Consulte')"
        name: "preco"
        widget: "number"
        value_type: "float"
        required: false
      - label: "Dormitórios (0 se não tiver ou não aplicável)"
        name: "dormitorios"
        widget: "number"
        default: 0
        required: false
      - label: "Características (uma por linha — clique em + para adicionar)"
        name: "caracteristicas"
        widget: "list"
      - {label: "Descrição completa", name: "descricao", widget: "text"}
      - label: "Fotos (clique em + para adicionar cada foto)"
        name: "fotos"
        widget: "list"
        field: {label: "Foto", name: "foto", widget: "image"}
      - label: "Latitude (copie do Google Maps) — obrigatório só para urbanos; rurais podem deixar em branco"
        name: "lat"
        widget: "number"
        value_type: "float"
        required: false
      - label: "Longitude (copie do Google Maps) — obrigatório só para urbanos; rurais podem deixar em branco"
        name: "lng"
        widget: "number"
        value_type: "float"
        required: false
      - label: "Localização ainda aproximada? (permite arrastar o marcador no site)"
        name: "aproximado"
        widget: "boolean"
        default: false
        required: false
      - {label: "mapaRural (uso interno — não alterar)", name: "mapaRural", widget: "hidden", required: false}
      - {label: "geo (uso interno — não alterar)", name: "geo", widget: "hidden", required: false}
      - label: "Legendas do mapa (somente para imóveis rurais)"
        name: "legendas"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - {label: "Limites do imóvel", name: "legendaImovel", widget: "string", required: false, default: "Limites do imóvel"}
          - {label: "Área consolidada (produção)", name: "legendaConsolidada", widget: "string", required: false, default: "Área consolidada (produção)"}
          - {label: "Vegetação nativa", name: "legendaNativa", widget: "string", required: false, default: "Vegetação nativa"}
          - {label: "Reserva Legal", name: "legendaReserva", widget: "string", required: false, default: "Reserva Legal"}
          - {label: "APP", name: "legendaApp", widget: "string", required: false, default: "APP"}
          - {label: "Hidrografia / banhado", name: "legendaHidro", widget: "string", required: false, default: "Hidrografia / banhado"}
          - {label: "Servidão administrativa", name: "legendaServidao", widget: "string", required: false, default: "Servidão administrativa"}
